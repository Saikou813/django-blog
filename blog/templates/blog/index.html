{% extends "base.html" %}
{% block content %}
<div class="row">
    {% for post in post_list %}
    <div class="col-md-4">
        <div class="card mb-4">
            <div class="card-body">
                <h2 class="card-title">{{ post.title }}</h2>
                <p class="card-text">{{ post.excerpt }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock content %}
